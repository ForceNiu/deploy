<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>武夷山 · 庐山 · 九江 | 山水行旅</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛰️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f0e8;
            background-image:
                linear-gradient(180deg, #f5f0e8 0%, #efe8dc 50%, #f2ece2 100%);
            color: #1a2e1a;
            line-height: 1.6;
            scroll-behavior: smooth;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1800" opacity="0.04"><defs><linearGradient id="m1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%232d5a27" stop-opacity="0"/><stop offset="1" stop-color="%232d5a27" stop-opacity="0.4"/></linearGradient><linearGradient id="m2" x1="0" y1="0" x2="1" y2="0.3"><stop offset="0" stop-color="%235a8a52" stop-opacity="0.1"/><stop offset="1" stop-color="%235a8a52" stop-opacity="0"/></linearGradient></defs><path fill="url(%23m1)" stroke="%232d5a27" stroke-width="1.8" d="M0,600 Q150,480 300,520 Q500,400 700,480 L700,1800 L0,1800 Z"/><path fill="none" stroke="%235a8a52" stroke-width="1" d="M200,750 Q400,650 600,700 T1000,620" opacity="0.5"/><path fill="none" stroke="%232d5a27" stroke-width="0.6" d="M50,900 Q250,830 450,870 T850,800" opacity="0.3"/><circle cx="300" cy="250" r="35" fill="none" stroke="%235a8a52" stroke-width="1" opacity="0.25"/><circle cx="900" cy="180" r="50" fill="none" stroke="%232d5a27" stroke-width="0.8" opacity="0.2"/></svg>');
            background-repeat: repeat;
            background-size: 700px 900px;
            pointer-events: none;
            z-index: -1;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse 120% 40% at 10% 95%, rgba(45,90,39,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 80% 30% at 90% 10%, rgba(90,138,82,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* ========== 导航栏 ========== */
        .sticky-nav {
            position: sticky;
            top: 0;
            background: rgba(245,240,232,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid #d4ddd0;
            padding: 0.6rem 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(26,46,26,0.06);
        }
        .nav-inner {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            gap: 0.4rem;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .nav-inner::-webkit-scrollbar { display: none; }
        .nav-link {
            flex-shrink: 0;
            padding: 0.35rem 0.7rem;
            background: #fefcf8;
            border-radius: 2rem;
            font-size: 0.78rem;
            font-weight: 500;
            color: #3d6b34;
            text-decoration: none;
            border: 1px solid #d4ddd0;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .nav-link:hover { background: #e8efe2; border-color: #5a8a52; }
        .nav-link.active {
            background: #2d5a27;
            color: #fff;
            border-color: #2d5a27;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(45,90,39,0.25);
        }
        .nav-link .city-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .city-wuyi { background: #2d5a27; }
        .city-lushan { background: #4a90a8; }
        .city-jiujiang { background: #c75b39; }
        .city-move { background: linear-gradient(90deg, #2d5a27, #4a90a8); }

        /* ========== 布局 ========== */
        .container { max-width: 1000px; margin: 0 auto; padding: 1.2rem 1.2rem 3rem; }

        /* ========== Hero ========== */
        .hero {
            background: linear-gradient(135deg, #e8efe2 0%, #d4ddd0 50%, #c8d4be 100%);
            border-radius: 1.5rem;
            padding: 2rem 2.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #b8c8ae;
            box-shadow: 0 4px 20px rgba(45,90,39,0.08);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: "";
            position: absolute;
            top: -50%; right: -20%;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(199,91,57,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d5a27;
            font-family: 'ZCOOL KuaiLe', cursive;
            letter-spacing: 2px;
        }
        .hero p { font-size: 1rem; color: #5a6b5a; margin-top: 0.4rem; font-weight: 400; letter-spacing: 1px; }

        /* ========== 标题 ========== */
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
            padding: 0.7rem 1rem;
            border-left: 4px solid #2d5a27;
            color: #1a2e1a;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            background: linear-gradient(90deg, rgba(45,90,39,0.06), transparent);
            border-radius: 0 0.6rem 0.6rem 0;
        }
        .section-title:hover { background: linear-gradient(90deg, rgba(45,90,39,0.1), transparent); }
        .section-title .collapse-icon {
            font-size: 0.85rem;
            transition: transform 0.3s ease;
            color: #5a8a52;
        }
        .section-title.collapsed .collapse-icon {
            transform: rotate(-90deg);
        }
        .section-title.collapsed {
            margin-bottom: 0.5rem;
        }
        .section-content {
            overflow: visible;
            transition: opacity 0.3s ease;
            opacity: 1;
        }
        .section-content.collapsed {
            opacity: 0;
            height: 0;
            overflow: hidden;
            margin: 0;
        }

        /* ========== 天气卡片 ========== */
        .weather-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .weather-tab {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #d4ddd0;
            background: #fefcf8;
            color: #3d6b34;
            transition: all 0.2s;
        }
        .weather-tab.active { background: #2d5a27; color: #fff; border-color: #2d5a27; }
        .weather-tab:hover:not(.active) { background: #e8efe2; }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 0.7rem;
            margin-bottom: 1rem;
        }
        .weather-grid.all-view {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        }
        .weather-card {
            background: #fefcf8;
            border-radius: 0.8rem;
            padding: 0.7rem 0.5rem;
            text-align: center;
            border: 1px solid #d4ddd0;
            box-shadow: 0 2px 8px rgba(26,46,26,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .weather-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(26,46,26,0.1); }
        .weather-card.all-mode {
            padding: 0.8rem;
        }
        .weather-date { font-weight: 600; color: #2d5a27; font-size: 0.85rem; margin-bottom: 0.4rem; }
        .weather-icon { font-size: 1.2rem; margin: 0.15rem 0; }
        .temp { font-weight: 600; font-size: 0.9rem; color: #5a8a52; }
        .weather-note { font-size: 0.6rem; color: #7a8a7a; margin-top: 0.15rem; }
        .weather-src { font-size: 0.5rem; color: #aaa; margin-top: 0.15rem; }

        .weather-city-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.3rem 0;
            border-bottom: 1px dashed #c8e6c9;
        }
        .weather-city-row:last-child { border-bottom: none; }
        .weather-city-name {
            font-size: 0.72rem;
            color: #4a7c59;
            width: 40px;
            text-align: left;
            flex-shrink: 0;
        }
        .weather-city-info {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex: 1;
            justify-content: flex-end;
            flex-wrap: nowrap;
        }
        .weather-city-temp {
            font-size: 0.75rem;
            color: #81c784;
            font-weight: 600;
            white-space: nowrap;
        }
        .weather-city-text {
            font-size: 0.6rem;
            color: #4a7c59;
            background: #e8f5e9;
            padding: 0.1rem 0.3rem;
            border-radius: 0.8rem;
            white-space: nowrap;
        }

        /* ========== 骨架屏 ========== */
        .skeleton {
            background: linear-gradient(90deg, #e8efe2 25%, #f2ece2 50%, #e8efe2 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.8rem;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-card { height: 90px; }

        /* ========== 美食推荐 ========== */
        .food-tabs, .gift-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .food-tab, .gift-tab {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #d4ddd0;
            background: #fefcf8;
            color: #3d6b34;
            transition: all 0.2s;
        }
        .food-tab.active, .gift-tab.active { background: #2d5a27; color: #fff; border-color: #2d5a27; }
        .food-tab:hover:not(.active), .gift-tab:hover:not(.active) { background: #e8efe2; }
        .food-tab .city-dot, .gift-tab .city-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 0.3rem;
            vertical-align: middle;
        }
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            grid-auto-rows: 1fr;
        }
        .food-card {
            background: #fefcf8;
            border-radius: 0.8rem;
            overflow: hidden;
            border: 1px solid #d4ddd0;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(26,46,26,0.05);
        }
        .food-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(26,46,26,0.1); }
        .food-info {
            padding: 0.8rem 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .food-name {
            font-weight: 700;
            font-size: 1rem;
            color: #1a2e1a;
            margin-bottom: 0.2rem;
        }
        .food-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #e8efe2;
            color: #2d5a27;
            padding: 0.3rem 0.7rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #b8c8ae;
            transition: all 0.2s;
            margin-top: 0.6rem;
        }
        .food-nav-btn:hover { background: #d4ddd0; transform: translateY(-1px); }
        .food-nav-btn i { font-size: 0.65rem; }
        .food-location {
            font-size: 0.75rem;
            color: #5a6b5a;
            margin-bottom: 0.4rem;
        }
        .food-location i { margin-right: 0.3rem; }
        .food-desc {
            font-size: 0.82rem;
            color: #2a3a2a;
            line-height: 1.5;
            flex: 1;
        }
        .food-tags {
            display: flex;
            gap: 0.4rem;
            margin-top: auto;
            padding-top: 0.5rem;
            flex-wrap: wrap;
        }
        .food-tag {
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 1rem;
            background: #e8efe2;
            color: #5a8a52;
            border: 1px solid #d4ddd0;
        }

        /* ========== 每日卡片 ========== */
        .day-card {
            background: #fefcf8;
            border-radius: 1rem;
            margin-bottom: 1.2rem;
            border: 1px solid #d4ddd0;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(26,46,26,0.05);
        }
        .day-card:hover { border-color: #b8c8ae; box-shadow: 0 4px 14px rgba(26,46,26,0.08); }
        .day-card.today {
            border: 2px solid #c75b39;
            box-shadow: 0 0 0 3px rgba(199,91,57,0.15), 0 4px 14px rgba(199,91,57,0.1);
        }
        .day-card.today .day-header {
            background: linear-gradient(135deg, #fef8f0, #fde8d8);
            border-bottom-color: #e8c8b8;
        }
        .day-card.today .day-header::after {
            content: "📍 今天";
            font-size: 0.75rem;
            color: #c75b39;
            font-weight: 600;
            background: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            border: 1px solid #e8c8b8;
            margin-left: 0.5rem;
        }
        .day-header {
            background: linear-gradient(135deg, #e8efe2, #d4ddd0);
            padding: 0.9rem 1.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a2e1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
            border-bottom: 1px solid #d4ddd0;
            gap: 0.5rem;
        }
        .day-header:hover { background: linear-gradient(135deg, #d4ddd0, #c8d4be); }
        .day-header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        .day-header-left > span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .day-header .collapse-icon {
            font-size: 0.75rem;
            color: #5a8a52;
            transition: transform 0.3s ease;
        }
        .day-card.collapsed .collapse-icon { transform: rotate(-90deg); }
        .day-body {
            padding: 1rem 1.2rem;
            overflow: visible;
            transition: padding 0.4s ease, opacity 0.3s ease;
            opacity: 1;
        }
        .day-card.collapsed .day-body {
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            height: 0;
            overflow: hidden;
        }

        /* 强度指示器 */
        .intensity-bar { display: flex; gap: 3px; align-items: center; }
        .intensity-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #d4ddd0; transition: background 0.2s;
        }
        .intensity-dot.active { background: #2d5a27; }
        .intensity-label { font-size: 0.7rem; color: #5a6b5a; margin-left: 0.4rem; white-space: nowrap; flex-shrink: 0; }

        /* ========== 时间块 ========== */
        .time-block {
            margin-bottom: 1.4rem;
            border-left: 3px solid #5a8a52;
            padding-left: 1rem;
            position: relative;
        }
        .time-block:last-child { margin-bottom: 0; }
        .time-title { font-weight: 700; color: #2d5a27; margin-bottom: 0.4rem; font-size: 0.95rem; }
        .time-desc { font-size: 0.88rem; color: #2a3a2a; line-height: 1.6; }
        .meal-rec {
            background: #fef8f0;
            border-radius: 0.5rem;
            padding: 0.3rem 0.7rem;
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: #6b5a3a;
            display: inline-block;
            border: 1px solid #e8dcc8;
        }
        .meal-rec i { margin-right: 0.3rem; color: #5a8a52; }
        .attention-note {
            background: #fef8f0;
            padding: 0.4rem 0.7rem;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: #8a6a4a;
            border-left: 3px solid #c75b39;
        }
        .rain-plan {
            background: #f0f4f8;
            border-radius: 0.5rem;
            padding: 0.5rem 0.8rem;
            margin-top: 0.6rem;
            font-size: 0.8rem;
            color: #3a6a8a;
            border-left: 3px solid #4a90a8;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        .rain-plan i { color: #4a90a8; margin-top: 0.1rem; flex-shrink: 0; }
        .transport-info {
            background: #f5f0f8;
            border-radius: 0.5rem;
            padding: 0.4rem 0.7rem;
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: #5a4a6a;
            border-left: 3px solid #8a7a9a;
        }
        .transport-info i { color: #8a7a9a; }

        /* ========== 购票提醒 ========== */
        .ticket-item {
            background: #fefcf8;
            border-radius: 0.6rem;
            padding: 0.7rem 1rem;
            margin-bottom: 0.6rem;
            border: 1px solid #d4ddd0;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            box-shadow: 0 2px 6px rgba(26,46,26,0.04);
        }
        .ticket-label {
            background: #f0e6d8;
            color: #6b5a3a;
            border-radius: 1rem;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .ticket-desc { color: #2a3a2a; font-size: 0.85rem; }

        /* ========== 景点/美食快捷链接 ========== */
        .spot-links {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.6rem;
            padding-top: 0.5rem;
            border-top: 1px dashed #d4ddd0;
        }
        .spot-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.2rem 0.55rem;
            border-radius: 0.6rem;
            font-size: 0.7rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .spot-link i { font-size: 0.6rem; }
        .spot-link-food {
            background: #fef8f0;
            color: #8a6a3a;
            border: 1px solid #e8dcc8;
        }
        .spot-link-food:hover { background: #f0e6d8; }

        /* ========== 描述中的地点链接 ========== */
        .desc-link {
            color: #2d5a27;
            text-decoration: none;
            border-bottom: 1px dashed #5a8a52;
            font-weight: 500;
            transition: all 0.2s;
        }
        .desc-link:hover {
            color: #1a3a1c;
            border-bottom-color: #2d5a27;
            background: #e8efe2;
            border-radius: 2px;
        }

        /* ========== 伴手礼 ========== */
        .gift-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            grid-auto-rows: 1fr;
        }
        .gift-card {
            background: #fefcf8;
            border-radius: 0.8rem;
            border: 1px solid #d4ddd0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(26,46,26,0.05);
        }
        .gift-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(26,46,26,0.1); }
        .gift-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .gift-icon {
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .gift-wuyi { background: #e8efe2; }
        .gift-lushan { background: #e8f0f4; }
        .gift-jiujiang { background: #fef8f0; }
        .gift-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #2d5a27;
        }
        .gift-city {
            font-size: 0.7rem;
            color: #5a6b5a;
            margin-left: auto;
        }
        .gift-desc {
            font-size: 0.82rem;
            color: #2a3a2a;
            line-height: 1.5;
            flex: 1;
        }
        .gift-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.8rem;
            padding-top: 0.6rem;
            border-top: 1px dashed #d4ddd0;
        }
        .gift-price {
            font-size: 0.8rem;
            color: #c75b39;
            font-weight: 600;
        }
        .gift-where {
            font-size: 0.72rem;
            color: #5a6b5a;
        }
        .gift-tag {
            display: inline-block;
            font-size: 0.6rem;

            margin-right: 0.3rem;

        .gift-tag-hot { background: #fef0f0; color: #c62828; }

        /* ========== 门票汇总 ========== */
        .price-table {
            width: 100%;

        .weather-alert i { font-size: 1rem; flex-shrink: 0; }
        .weather-alert.rain {

        /* ========== 清单 ========== */
        .checklist-card {

        .checklist {

        /* ========== Tab计数标签 ========== */

            background: rgba(255,255,255,0.2);

        /* ========== 回到顶部 ========== */
        .back-to-top {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            background: #2d5a27; color: white;
            width: 2.8rem; height: 2.8rem; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 3px 10px rgba(45,90,39,0.25);
            z-index: 99; opacity: 0; transform: translateY(10px);

        }
        .back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .back-to-top:hover { background: #1a3a1c; transform: translateY(-2px); box-shadow: 0 4px 14px rgba(45,90,39,0.35); }

        /* ========== 快捷导航 ========== */
        .quick-nav {
            position: fixed;

            transform: translateY(-50%);
            z-index: 98;

            width: 2.2rem;
            height: 2.2rem;
            border-radius: 50%;
            background: #fefcf8;
            border: 1px solid #d4ddd0;

            align-items: center;

        .quick-nav-btn:hover {

        .quick-nav-btn .tooltip {

            right: 3rem;

            padding: 0.3rem 0.6rem;
            border-radius: 0.4rem;
            font-size: 0.7rem;
            white-space: nowrap;

        }

        }
        .quick-nav-section {

        @media (max-width: 768px) {

        /* ========== 移动端 ========== */
        @media (max-width: 640px) {
            .container { padding: 1rem; }
            .hero { padding: 1.2rem 1.4rem; border-radius: 1.5rem; }
            .hero h1 { font-size: 1.5rem; }

            .rain-plan { font-size: 0.75rem; }
            .food-grid { grid-template-columns: 1fr; }
            .food-img { height: 140px; }
        }
    </style>
</head>
<body>

<script>
    // ========== 常量 ==========
    const WUYI_LAT = 27.7518, WUYI_LON = 118.0343;
    const LUSHAN_LAT = 29.6619, LUSHAN_LON = 115.9147;
    const JIUJIANG_LAT = 29.7050, JIUJIANG_LON = 116.0017;
    const TRIP_START = '2026-06-12';
    const TRIP_END = '2026-06-20';
    const FORECAST_DAYS = 16;
    const HISTORY_YEAR = '2025';
    const LOCAL_REF = {
        '武夷山': { code: 61, tmin: 22, tmax: 30 },
        '庐山': { code: 61, tmin: 18, tmax: 24 },
        '九江': { code: 61, tmin: 24, tmax: 32 }
    };

    // ========== 天气 ==========
    function wmoToText(c) {
        const m = {0:'晴',1:'晴间多云',2:'多云',3:'阴',45:'雾',48:'雾',51:'毛毛雨',53:'毛毛雨',55:'毛毛雨',61:'小雨',63:'中雨',65:'大雨',80:'阵雨',81:'阵雨',95:'雷暴',96:'雷暴',99:'雷暴'};
        return m[c] || '多云';
    }
    function wmoToEmoji(c) {
        const m = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌧️',53:'🌧️',55:'🌧️',61:'🌦️',63:'🌧️',65:'🌧️',80:'🌦️',81:'🌧️',95:'⛈️',96:'⛈️',99:'⛈️'};
        return m[c] || '🌡️';
    }

    async function fetchForecast(lat, lon) {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_mean&timezone=Asia/Shanghai&forecast_days=${FORECAST_DAYS}`;
        const r = await fetch(url);
        if (!r.ok) throw new Error();
        const d = await r.json();
        let m = {};
        for (let i = 0; i < d.daily.time.length; i++) {
            m[d.daily.time[i]] = { code: d.daily.weathercode[i], tmax: d.daily.temperature_2m_max[i], tmin: d.daily.temperature_2m_min[i], precip: d.daily.precipitation_probability_mean[i] || 0, src: 'forecast' };
        }
        return m;
    }

    async function fetchHistorical(lat, lon, s, e) {
        const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${s}&end_date=${e}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia/Shanghai`;
        const r = await fetch(url);
        if (!r.ok) throw new Error();
        const d = await r.json();
        let m = {};
        if (d.daily) for (let i = 0; i < d.daily.time.length; i++) {
            m[d.daily.time[i]] = { code: d.daily.weathercode[i], tmax: d.daily.temperature_2m_max[i], tmin: d.daily.temperature_2m_min[i], precip: null, src: 'history' };
        }
        return m;
    }

    function getDateRange(s, e) {
        let a = [], c = new Date(s), ed = new Date(e);
        while (c <= ed) { a.push(c.toISOString().slice(0, 10)); c.setDate(c.getDate() + 1); }
        return a;
    }

    let weatherData = { wuyi: {}, lushan: {}, jiujiang: {} };
    let currentCityFilter = 'all';

    function renderWeatherCards() {
        const container = document.getElementById('weatherGrid');
        const dates = getDateRange(TRIP_START, TRIP_END);
        let html = '';

        if (currentCityFilter === 'all') {
            container.classList.add('all-view');
            for (let date of dates) {
                const wy = weatherData.wuyi[date];
                const ls = weatherData.lushan[date];
                const jj = weatherData.jiujiang[date];
                html += `<div class="weather-card all-mode">
                    <div class="weather-date">${date.slice(5)}</div>
                    <div class="weather-city-row">
                        <span class="weather-city-name">武夷</span>
                        <div class="weather-city-info">
                            <span>${wy ? wmoToEmoji(wy.code) : '-'}</span>
                            <span class="weather-city-text">${wy ? wmoToText(wy.code) : '-'}</span>
                            <span class="weather-city-temp">${wy ? Math.round(wy.tmin)+'~'+Math.round(wy.tmax)+'°' : '-'}</span>
                        </div>
                    </div>
                    <div class="weather-city-row">
                        <span class="weather-city-name">庐山</span>
                        <div class="weather-city-info">
                            <span>${ls ? wmoToEmoji(ls.code) : '-'}</span>
                            <span class="weather-city-text">${ls ? wmoToText(ls.code) : '-'}</span>
                            <span class="weather-city-temp">${ls ? Math.round(ls.tmin)+'~'+Math.round(ls.tmax)+'°' : '-'}</span>
                        </div>
                    </div>
                    <div class="weather-city-row">
                        <span class="weather-city-name">九江</span>
                        <div class="weather-city-info">
                            <span>${jj ? wmoToEmoji(jj.code) : '-'}</span>
                            <span class="weather-city-text">${jj ? wmoToText(jj.code) : '-'}</span>
                            <span class="weather-city-temp">${jj ? Math.round(jj.tmin)+'~'+Math.round(jj.tmax)+'°' : '-'}</span>
                        </div>
                    </div>
                </div>`;
            }
        } else {
            container.classList.remove('all-view');
            const cityKey = currentCityFilter === 'wuyi' ? 'wuyi' : currentCityFilter === 'lushan' ? 'lushan' : 'jiujiang';
            const data = weatherData[cityKey];
            for (let date of dates) {
                const d = data[date];
                if (!d) continue;
                html += `<div class="weather-card">
                    <div class="weather-date">${date.slice(5)}</div>
                    <div class="weather-icon">${wmoToEmoji(d.code)}</div>
                    <div style="font-size:0.7rem; color:#81c784;">${wmoToText(d.code)}</div>
                    <div class="temp">${Math.round(d.tmin)}~${Math.round(d.tmax)}°</div>
                    ${d.precip !== null ? `<div class="weather-note">💧 ${d.precip}%</div>` : ''}
                    ${d.src !== 'forecast' ? `<div class="weather-src">参考</div>` : ''}
                </div>`;
            }
        }
        container.innerHTML = html;
    }

    async function renderWeather() {
        const note = document.getElementById('weatherNote');
        try {
            const [wyF, lsF, jjF, wyH, lsH, jjH] = await Promise.all([
                fetchForecast(WUYI_LAT, WUYI_LON),
                fetchForecast(LUSHAN_LAT, LUSHAN_LON),
                fetchForecast(JIUJIANG_LAT, JIUJIANG_LON),
                fetchHistorical(WUYI_LAT, WUYI_LON, `${HISTORY_YEAR}-06-12`, `${HISTORY_YEAR}-06-20`),
                fetchHistorical(LUSHAN_LAT, LUSHAN_LON, `${HISTORY_YEAR}-06-12`, `${HISTORY_YEAR}-06-20`),
                fetchHistorical(JIUJIANG_LAT, JIUJIANG_LON, `${HISTORY_YEAR}-06-12`, `${HISTORY_YEAR}-06-20`)
            ]);

            const dates = getDateRange(TRIP_START, TRIP_END);
            let fc = 0, hc = 0, fb = 0;

            for (let date of dates) {
                let wyD = wyF[date]; if (!wyD && wyH[date]) wyD = wyH[date];
                if (!wyD) { wyD = { ...LOCAL_REF['武夷山'], src: 'fallback' }; fb++; } else if (wyD.src === 'forecast') fc++; else hc++;
                weatherData.wuyi[date] = wyD;

                let lsD = lsF[date]; if (!lsD && lsH[date]) lsD = lsH[date];
                if (!lsD) { lsD = { ...LOCAL_REF['庐山'], src: 'fallback' }; fb++; } else if (lsD.src === 'forecast') fc++; else hc++;
                weatherData.lushan[date] = lsD;

                let jjD = jjF[date]; if (!jjD && jjH[date]) jjD = jjH[date];
                if (!jjD) { jjD = { ...LOCAL_REF['九江'], src: 'fallback' }; fb++; } else if (jjD.src === 'forecast') fc++; else hc++;
                weatherData.jiujiang[date] = jjD;

                    result = result.replace(key, `<a href="${url}" target="_blank" rel="noopener" class="desc-link">${key}</a>`);

    function updateNavHighlight() {
        const cards = document.querySelectorAll('.day-card');
        const navLinks = document.querySelectorAll('.nav-link');
        const scrollTop = window.scrollY;
        const offset = 150; // 导航栏高度 + 缓冲

        // 获取最后一个卡片的底部位置
        const lastCard = cards[cards.length - 1];
        const lastCardBottom = lastCard ? lastCard.getBoundingClientRect().bottom + window.scrollY : 0;

        let currentIdx = -1;
        cards.forEach((card, idx) => {
            const rect = card.getBoundingClientRect();
            if (rect.top <= offset + 20) currentIdx = idx;
        });

        // 如果还没滑到第一个卡片，或已滑过最后一个卡片，不选中任何导航
        if (currentIdx === -1 || scrollTop < 200 || scrollTop + window.innerHeight > lastCardBottom + 100) {
            navLinks.forEach(link => link.classList.remove('active'));
            return;
        }

        navLinks.forEach((link, idx) => {
            link.classList.toggle('active', idx === currentIdx);
        });

        const activeLink = navLinks[currentIdx];
        if (activeLink) {
            activeLink.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    }

    // ========== 天气预警 ==========
    function checkWeatherAlerts() {
        const alerts = [];
        const dates = getDateRange(TRIP_START, TRIP_END);
        const today = new Date().toISOString().slice(0, 10);

        for (let date of dates) {
            const wy = weatherData.wuyi[date];
            const ls = weatherData.lushan[date];
            const jj = weatherData.jiujiang[date];

            // 高温预警
            [wy, ls, jj].forEach((d, i) => {
                const city = ['武夷山', '庐山', '九江'][i];
                if (d && d.tmax >= 35) {
                    alerts.push({ type: 'hot', icon: 'fa-temperature-high', text: `${date.slice(5)} ${city} 高温 ${Math.round(d.tmax)}°C，注意防暑` });
                }
            });

            // 大雨预警
            [wy, ls, jj].forEach((d, i) => {
                const city = ['武夷山', '庐山', '九江'][i];
                if (d && (d.code === 65 || d.code === 95 || d.code === 96 || d.code === 99)) {
                    alerts.push({ type: 'rain', icon: 'fa-cloud-showers-heavy', text: `${date.slice(5)} ${city} ${wmoToText(d.code)}，户外活动注意安全` });
                }
            });
        }

        const container = document.getElementById('weatherAlerts');
        if (alerts.length === 0) {
            container.innerHTML = '';
            return;
        }
        // 去重并限制显示数量
        const unique = [...new Set(alerts.map(a => a.text))].slice(0, 5);
        let html = '';
        const alertType = alerts[0].type;
        html += `<div class="weather-alert ${alertType}"><i class="fas ${alertType === 'hot' ? 'fa-exclamation-triangle' : 'fa-cloud-rain'}"></i><span><strong>天气提醒：</strong>${unique.join('；')}</span></div>`;
        container.innerHTML = html;
    }

    // ========== 清单 ==========
    const packingItems = [
        { name: "折叠伞（天堂/蕉下）", category: "防雨", essential: true },
        { name: "轻便雨衣", category: "防雨", essential: false },
        { name: "防水冲锋衣", category: "防雨", essential: true },
        { name: "防滑溯溪鞋", category: "防雨", essential: true },
        { name: "手机防水袋、背包防雨罩", category: "防雨", essential: false },
        { name: "肠胃药：蒙脱石散、黄连素", category: "药品", essential: true },
        { name: "晕车药：茶苯海明（乘晕宁）", category: "药品", essential: false },
        { name: "抗过敏：氯雷他定、炉甘石洗剂", category: "药品", essential: false },
        { name: "外伤：碘伏棉签、创可贴", category: "药品", essential: true },
        { name: "布洛芬、藿香正气水", category: "药品", essential: true },
        { name: "驱蚊液（避蚊胺/派卡瑞丁）", category: "其他", essential: true },
        { name: "防晒霜SPF50+", category: "其他", essential: true },
        { name: "宽檐帽、冰袖、墨镜", category: "其他", essential: false },
        { name: "薄外套、泳衣", category: "其他", essential: false },
        { name: "充电宝、证件、现金", category: "其他", essential: true }
    ];

    function renderPackingChecklist() {
        const categoryMap = {
            "防雨": { title: "🌂 防雨装备", icon: "fa-umbrella" },
            "药品": { title: "💊 健康药品", icon: "fa-capsules" },
            "其他": { title: "🦟 驱蚊防晒 & 其他", icon: "fa-bug" }
        };
        let html = '';
        for (let cat of ["防雨", "药品", "其他"]) {
            const catItems = packingItems.filter(i => i.category === cat);
            if (catItems.length === 0) continue;
            html += `<div class="checklist-category"><div class="checklist-title"><i class="fas ${categoryMap[cat].icon}"></i> ${categoryMap[cat].title}</div><ul class="checklist">`;
            catItems.forEach(item => {
                const cls = item.essential ? 'essential' : '';
                const icon = item.essential ? 'fa-star' : 'fa-check-circle';
                html += `<li class="${cls}"><i class="fas ${icon}"></i> ${item.name}</li>`;
            });
            html += `</ul></div>`;
        }
        document.getElementById('packingListCheck').innerHTML = html;
    }

    // ========== 回到顶部 ==========
    function setupBackToTop() {
        const btn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) btn.classList.add('visible');
            else btn.classList.remove('visible');
        });
        btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    }

    // ========== Tab计数更新 ==========
    function updateTabCounts() {
        // 美食计数
        const foodCounts = { all: foodData.length, wuyi: 0, lushan: 0, jiujiang: 0 };
        foodData.forEach(f => { if (foodCounts[f.region] !== undefined) foodCounts[f.region]++; });
        document.querySelectorAll('#foodTabs .food-tab').forEach(tab => {
            const city = tab.dataset.city;
            const count = foodCounts[city] || 0;
            let countEl = tab.querySelector('.tab-count');
            if (!countEl) {
                countEl = document.createElement('span');
                countEl.className = 'tab-count';
                tab.appendChild(countEl);
            }
            countEl.textContent = count;
        });

        // 伴手礼计数
        const giftCounts = { all: giftData.length, wuyi: 0, lushan: 0, jiujiang: 0 };
        giftData.forEach(g => { if (giftCounts[g.region] !== undefined) giftCounts[g.region]++; });
        document.querySelectorAll('#giftTabs .gift-tab').forEach(tab => {
            const city = tab.dataset.city;
            const count = giftCounts[city] || 0;
            let countEl = tab.querySelector('.tab-count');
            if (!countEl) {
                countEl = document.createElement('span');
                countEl.className = 'tab-count';
                tab.appendChild(countEl);
            }
            countEl.textContent = count;
        });
    }

    // ========== 滚动进度条 ==========
    function setupScrollProgress() {
        const progressBar = document.getElementById('scrollProgress');
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            progressBar.style.width = progress + '%';
        });
    }

    // ========== 快捷导航跳转 ==========
    function scrollToSection(section) {
        const sectionMap = {
            'weather': '行程天气',
            'daily': '每日行程',
            'food': '必吃美食',
            'gift': '伴手礼',
            'ticket': '门票价格',
            'checklist': '雨季行装'
        };
        const title = sectionMap[section];
        if (!title) return;
        // 找到对应的 section-title
        const titles = document.querySelectorAll('.section-title');
        for (const el of titles) {
            if (el.textContent.includes(title)) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                break;
            }
        }
    }

    // ========== 今日高亮 ==========
    function highlightToday() {
        const today = new Date();
        const month = today.getMonth() + 1;
        const day = today.getDate();
        const todayStr = `${month}/${day}`;

        // 行程日期范围 6/12 - 6/20
        const tripDates = [
            { date: '6/12', idx: 0 },
            { date: '6/13', idx: 1 },
            { date: '6/14', idx: 2 },
            { date: '6/15', idx: 3 },
            { date: '6/16', idx: 4 },
            { date: '6/17', idx: 5 },
            { date: '6/18', idx: 6 },
            { date: '6/19', idx: 7 },
            { date: '6/20', idx: 8 }
        ];

        const match = tripDates.find(d => d.date === todayStr);
        if (match) {
            const card = document.getElementById(`day-${match.idx}`);
            if (card) {
                card.classList.add('today');
                // 3秒后自动滚动到今日行程
                setTimeout(() => {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 500);
            }
        }
    }

    // ========== 初始化 ==========
    window.addEventListener('DOMContentLoaded', () => {
        buildNav();
        buildDailyCards();
        buildFoodGrid();
        buildGiftGrid();
        buildTicketTips();
        buildPriceSummary();
        renderPackingChecklist();
        updateTabCounts();
        highlightToday();
        renderWeather().then(() => {
            checkWeatherAlerts();
        });
        setupBackToTop();
        setupScrollProgress();

        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    updateNavHighlight();
                    ticking = false;
                });
                ticking = true;
            }
        });
    });
</script>
</body>
</html>
