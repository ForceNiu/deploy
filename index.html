<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>武夷山 · 庐山 · 九江 | 山水行旅</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛰️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 滚动进度条 -->
<div class="scroll-progress" id="scrollProgress"></div>

<!-- 导航栏 -->
<nav class="sticky-nav">
    <div class="nav-inner" id="navLinks"></div>
</nav>

<div class="container">
    <!-- Hero -->
    <div class="hero">
        <h1>⛰️ 武夷 · 庐山 · 九江 🌊</h1>
        <p>竹筏 · 茶香 · 云海 · 慢生活 | 6.12 – 6.20</p>
    </div>

    <!-- 天气 -->
    <div class="section-title collapsed" onclick="toggleSection(this)"><span><i class="fas fa-cloud-sun"></i> 行程天气 · 6月12日-20日</span><i class="fas fa-chevron-down collapse-icon"></i></div>
    <div class="section-content collapsed">
        <div class="weather-tabs" id="weatherTabs">
            <div class="weather-tab active" data-city="all">全部</div>
            <div class="weather-tab" data-city="wuyi">⛰️ 武夷山</div>
            <div class="weather-tab" data-city="lushan">🏔️ 庐山</div>
            <div class="weather-tab" data-city="jiujiang">🏙️ 九江</div>
        </div>
        <div class="weather-grid" id="weatherGrid">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>
        <div id="weatherNote" style="font-size:0.7rem; text-align:center; margin-bottom:1.5rem; color:#4a7c59;"></div>
        <div id="weatherAlerts"></div>
    </div>

    <!-- 每日行程 -->
    <div class="section-title" onclick="toggleSection(this)"><span><i class="fas fa-calendar-day"></i> 每日行程安排</span><i class="fas fa-chevron-down collapse-icon"></i></div>
    <div class="section-content" id="dailyCards"></div>

    <!-- 美食推荐 -->
    <div class="section-title" onclick="toggleSection(this)"><span><i class="fas fa-utensils"></i> 必吃美食 · 地道风味</span><i class="fas fa-chevron-down collapse-icon"></i></div>
    <div class="section-content">
        <div class="food-tabs" id="foodTabs">
            <div class="food-tab active" data-city="all">全部</div>
            <div class="food-tab" data-city="wuyi"><span class="city-dot city-wuyi"></span>武夷山</div>
            <div class="food-tab" data-city="lushan"><span class="city-dot city-lushan"></span>庐山</div>
            <div class="food-tab" data-city="jiujiang"><span class="city-dot city-jiujiang"></span>九江</div>
        </div>
        <div class="food-grid" id="foodGrid"></div>
    </div>

    <!-- 购票提醒 -->
    <div class="section-title" onclick="toggleSection(this)"><span><i class="fas fa-ticket-alt"></i> 提前购票提醒</span><i class="fas fa-chevron-down collapse-icon"></i></div>
    <div class="section-content" id="ticketTips"></div>

    <!-- 门票价格汇总 -->
    <div class="section-title" onclick="toggleSection(this)"><span><i class="fas fa-receipt"></i> 门票价格汇总</span><i class="fas fa-chevron-down collapse-icon"></i></div>
    <div class="section-content" id="priceSummary"></div>

    <!-- 伴手礼推荐 -->
    <div class="section-title" onclick="toggleSection(this)"><span><i class="fas fa-gift"></i> 伴手礼 · 特产推荐</span><i class="fas fa-chevron-down collapse-icon"></i></div>
    <div class="section-content">
        <div class="gift-tabs" id="giftTabs">
            <div class="gift-tab active" data-city="all">全部</div>
            <div class="gift-tab" data-city="wuyi"><span class="city-dot city-wuyi"></span>武夷山</div>
            <div class="gift-tab" data-city="lushan"><span class="city-dot city-lushan"></span>庐山</div>
            <div class="gift-tab" data-city="jiujiang"><span class="city-dot city-jiujiang"></span>九江</div>
        </div>
        <div class="gift-grid" id="giftGrid"></div>
    </div>

    <!-- 清单 -->
    <div class="section-title" onclick="toggleSection(this)"><span><i class="fas fa-suitcase-rolling"></i> 雨季行装 · 自检清单</span><i class="fas fa-chevron-down collapse-icon"></i></div>
    <div class="section-content">
        <div class="checklist-card" id="packingListCheck"></div>
    </div>

    <footer>⛰️ 天气基于实时+历史参考，点击日期可快速跳转。愿你行旅从容，心静山青。</footer>
</div>

<div class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></div>

<!-- 底部日期浮窗 -->
<nav class="bottom-date-nav" id="bottomDateNav">
    <button class="nav-arrow" id="navPrev" title="上一天"><i class="fas fa-chevron-left"></i></button>
    <div class="nav-center">
        <span class="nav-day-info" id="navDayInfo">Day 1/9 · 6/12 武夷山</span>
        <span class="nav-city" id="navCity">启程入山</span>
    </div>
    <button class="nav-today-btn" id="navTodayBtn" title="回到今天">📍今天</button>
    <button class="nav-arrow" id="navNext" title="下一天"><i class="fas fa-chevron-right"></i></button>
</nav>

<!-- 快捷导航 -->
<nav class="quick-nav" id="quickNav">
    <div class="quick-nav-btn" onclick="document.querySelector('.hero').scrollIntoView({behavior:'smooth'})" title="顶部">
        <i class="fas fa-home"></i>
        <span class="tooltip">顶部</span>
    </div>
    <div class="quick-nav-btn" onclick="scrollToSection('weather')" title="天气">
        <i class="fas fa-cloud-sun"></i>
        <span class="tooltip">天气</span>
    </div>
    <div class="quick-nav-btn" onclick="scrollToSection('daily')" title="行程">
        <i class="fas fa-calendar-day"></i>
        <span class="tooltip">行程</span>
    </div>
    <div class="quick-nav-btn" onclick="scrollToSection('food')" title="美食">
        <i class="fas fa-utensils"></i>
        <span class="tooltip">美食</span>
    </div>
    <div class="quick-nav-btn" onclick="scrollToSection('gift')" title="伴手礼">
        <i class="fas fa-gift"></i>
        <span class="tooltip">伴手礼</span>
    </div>
    <div class="quick-nav-btn" onclick="scrollToSection('ticket')" title="门票">
        <i class="fas fa-receipt"></i>
        <span class="tooltip">门票</span>
    </div>
    <div class="quick-nav-btn" onclick="scrollToSection('checklist')" title="清单">
        <i class="fas fa-suitcase-rolling"></i>
        <span class="tooltip">清单</span>
    </div>
</nav>

    <!-- 数据文件（按序加载） -->
    <script src="data/day12.js"></script>
    <script src="data/day13.js"></script>
    <script src="data/day14.js"></script>
    <script src="data/day15.js"></script>
    <script src="data/day16.js"></script>
    <script src="data/day17.js"></script>
    <script src="data/day18.js"></script>
    <script src="data/day19.js"></script>
    <script src="data/day20.js"></script>
    <script src="data/days.js"></script>
    <script src="data/food.js"></script>
    <script src="data/gifts.js"></script>
    <script src="data/checklist.js"></script>
    <script src="main.js"></script>
</body>
</html>
